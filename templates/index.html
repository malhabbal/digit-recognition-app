<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Digit Recognition</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Draw a Digit (0-9)</h1>
        <div class="canvas-container">
            <canvas id="digitCanvas" width="280" height="280"></canvas>
        </div>
        <div class="buttons">
            <button id="clearBtn">Clear</button>
            <button id="predictBtn">Predict</button>
        </div>
        <div id="result">
            <span id="predictionText"></span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('digitCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas background to white and line style
        ctx.fillStyle = 'gray';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 15;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        let drawing = false;

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch events for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const mouseEvent = new MouseEvent('mouseup', {});
            canvas.dispatchEvent(mouseEvent);
        });

        function startDrawing(e) {
            drawing = true;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        }

        function draw(e) {
            if (!drawing) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        }

        function stopDrawing() {
            drawing = false;
            ctx.closePath();
        }

        // Clear canvas
        document.getElementById('clearBtn').addEventListener('click', () => {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'black'; // reset for future drawing
            document.getElementById('predictionText').innerText = '';
        });

        // Predict button
        document.getElementById('predictBtn').addEventListener('click', () => {
            // Convert canvas to base64 PNG
            const dataURL = canvas.toDataURL('image/png');
            
            document.getElementById('predictionText').innerText = 'Predicting...';
            
            fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataURL })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('predictionText').innerText = 'Error: ' + data.error;
                } else {
                    document.getElementById('predictionText').innerText = 
                        `Predicted Digit: ${data.digit} (Confidence: ${(data.confidence*100).toFixed(2)}%)`;
                }
            })
            .catch(error => {
                document.getElementById('predictionText').innerText = 'Request failed';
                console.error(error);
            });
        });
    </script>
</body>
</html>
